app-id: com.github.randy.Neditor
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: neditor
finish-args:
  - --share=ipc
  - --filesystem=home
modules:
  - name: neditor
    buildsystem: simple
    build-commands:
      - install -D neditor /app/bin/neditor
      - install -D neditor.1 /app/share/man/man1/neditor.1
      - install -D neditor.desktop /app/share/applications/com.github.randy.Neditor.desktop
    sources:
      - type: file
        path: .nitpick_make/build/neditor
      - type: file
        path: docs/neditor.1
      - type: file
        path: assets/neditor.desktop
